<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Swift Courier</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="site-header"></div>

<section class="hero">
  <h2>Place an Order / Contact Us</h2>
  <p>Fill the form below and we'll get your package delivered quickly.</p>
</section>

<section class="content">
  <form id="orderForm">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <input type="text" name="pickup" placeholder="Pickup Location" required>
    <input type="text" name="delivery" placeholder="Delivery Location" required>

    <input type="hidden" name="location" id="location">
    <button type="button" id="getLocationBtn">📍 Use Current Location</button>

    <textarea name="message" placeholder="Additional Details" rows="4"></textarea>
    <button type="submit">Send Order</button>
  </form>
</section>

<div id="site-footer"></div>
<div id="whatsapp-float"></div>

<script src="shared.js"></script>
<script src="script.js"></script>
</body>
</html>
